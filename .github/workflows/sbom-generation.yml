name: SBOM Generation and Upload

on:
  push: 
    branches: 
      - '*'
    tags:
      - '*'
  workflow_dispatch: 

env:
  TARGET_PATH: "."
  OUTPUT_FOLDER: ${{ github.event.repository.name }}
  SBOM_API_URL: ${{ secrets.SBOM_API_URL }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sbom_generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    outputs:
      version_folder: ${{ steps.set-version.outputs.version_folder }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run:  |
          echo "📥 Installing system packages..."
          sudo apt-get update -qq > /dev/null 2>&1
          sudo apt-get install -y -qq curl unzip jq git > /dev/null 2>&1
          echo "📦 Installing cdxgen..."
          npm install -g @cyclonedx/cdxgen --silent 2>/dev/null
          echo "🛡️ Installing grype..."
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin > /dev/null 2>&1
          echo "✅ Tools ready: cdxgen $(cdxgen --version 2>/dev/null | head -1), grype $(grype version 2>&1 | grep -m1 'Version' || echo 'ok')"

      - name: Set version folder
        id: set-version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          DATE_PART=$(date +%Y-%m-%d)
          TIME_PART=$(date +%H-%M-%S)
          VERSION_FOLDER="v${SHORT_SHA}_${DATE_PART}_${TIME_PART}"
          echo "version_folder=$VERSION_FOLDER" >> $GITHUB_OUTPUT
          echo "VERSION_FOLDER=$VERSION_FOLDER" >> $GITHUB_ENV

      - name: Generate SBOM
        run: |
          set -e
          echo "🔧 Generating SBOM for $OUTPUT_FOLDER @ $VERSION_FOLDER"
          
          FINAL_OUTPUT_PATH="${OUTPUT_FOLDER}/${VERSION_FOLDER}"
          mkdir -p "$FINAL_OUTPUT_PATH"
          
          SBOM_FILE="$FINAL_OUTPUT_PATH/sbom.json"
          GRYPE_FILE="$FINAL_OUTPUT_PATH/grype.json"
          ENRICHED_SBOM="$FINAL_OUTPUT_PATH/sbom-with-vulns.json"
          
          echo "📦 Running cdxgen..."
          cdxgen "$TARGET_PATH" -o "$SBOM_FILE" --exclude "*sbom*.json" --exclude "*grype*.json" 2>/dev/null
          COMP_COUNT=$(jq '.components | length' "$SBOM_FILE" 2>/dev/null || echo "?")
          echo "   → $COMP_COUNT components found"
          
          echo "🛡️ Running Grype vulnerability scan..."
          grype sbom:"$SBOM_FILE" -o json --quiet > "$GRYPE_FILE" 2>/dev/null
          VULN_COUNT=$(jq '.matches | length' "$GRYPE_FILE" 2>/dev/null || echo "?")
          echo "   → $VULN_COUNT vulnerabilities found"
          
          echo "🧩 Merging SBOM with vulnerability data..."
          jq -s '.[0] * {"grypeReport": .[1]}' \
            "$SBOM_FILE" \
            "$GRYPE_FILE" \
            > "$ENRICHED_SBOM"
          
          echo "✅ SBOM complete: $COMP_COUNT components, $VULN_COUNT vulnerabilities ($(wc -c < "$ENRICHED_SBOM") bytes)"

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name:  sbom-files
          path: ${{ env.OUTPUT_FOLDER }}/${{ env.VERSION_FOLDER }}/
          retention-days: 7

  upload_sbom:
    name: Upload SBOM
    runs-on: ubuntu-latest
    needs: sbom_generation
    environment: sbom
    steps:
      - name: Download SBOM artifacts
        uses:  actions/download-artifact@v4
        with:
          name:  sbom-files
          path:  ./sbom-files

      - name:  Install dependencies
        run: |
          echo "📥 Installing dependencies..."
          sudo apt-get update -qq > /dev/null 2>&1
          sudo apt-get install -y -qq curl jq > /dev/null 2>&1
          echo "✅ Done"

      - name: Upload SBOM to API
        env:
          GITHUB_API_KEY: ${{ secrets.SBOM_API_KEY }}
          VERSION_FOLDER: ${{ needs.sbom_generation.outputs.version_folder }}
        run: |
          set -e
          
          SBOM_FILE="./sbom-files/sbom.json"
          GRYPE_FILE="./sbom-files/grype.json"
          ENRICHED_SBOM="./sbom-files/sbom-with-vulns.json"
          
          echo "📤 Uploading SBOM to $SBOM_API_URL"
          echo "📁 Version:  $VERSION_FOLDER"
          
          if [ -z "$GITHUB_API_KEY" ]; then
            echo "❌ Error: SBOM_API_KEY secret is not set."
            exit 1
          fi
          
          if [ -z "$SBOM_API_URL" ]; then
            echo "❌ Error: SBOM_API_URL secret is not set."
            exit 1
          fi
          
          if [ !  -f "$ENRICHED_SBOM" ]; then
            echo "❌ Error:  SBOM file not found at $ENRICHED_SBOM"
            exit 1
          fi
          
          echo "📄 SBOM file size: $(wc -c < "$ENRICHED_SBOM") bytes"
          
          echo "📊 Preparing upload_payload.json..."
          jq -n \
            --arg folder "$OUTPUT_FOLDER" \
            --arg version "$VERSION_FOLDER" \
            --arg commit "${{ github.sha }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg run_id "${{ github.run_id }}" \
            --arg project "${{ github.event.repository.name }}" \
            --arg projectUrl "${{ github.event.repository.html_url }}" \
            --slurpfile sbomWithVulns "$ENRICHED_SBOM" \
            --slurpfile sbomBase "$SBOM_FILE" \
            --slurpfile grype "$GRYPE_FILE" \
            '{
              folder: $folder,
              version:  $version,
              metadata: {
                commit: $commit,
                branch: $branch,
                runId: $run_id,
                project: $project,
                projectUrl: $projectUrl,
                source: "github-actions",
                uploadedAt: now | todate
              },
              files: [
                { filename: "sbom-with-vulns.json", content: $sbomWithVulns[0] },
                { filename: "sbom.json", content: $sbomBase[0] },
                { filename: "grype.json", content: $grype[0] }
              ]
            }' > upload_payload.json
          
          echo "🚀 Uploading..."
          RESPONSE=$(curl -sSL -w "\n%{http_code}" \
            -X POST "$SBOM_API_URL" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $GITHUB_API_KEY" \
            -H "ngrok-skip-browser-warning: true" \
            --data-binary @upload_payload.json \
            --max-time 120)
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "📡 Response code: $HTTP_CODE"
          echo "📋 Response body: $BODY"
          
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ SBOM uploaded successfully!"
          else
            echo "❌ Failed to upload SBOM (HTTP $HTTP_CODE)"
            exit 1
          fi
